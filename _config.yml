# Profile intro blurb
intro: >
  I'm a Senior Software Engineer & IoT Architect at IBM with over 20 years of
  experience designing and building enterprise-grade Internet of Things platforms,
  cloud-native microservices, and intelligent building management systems.
  <br><br>
  At IBM I am a key contributor to the <strong>Watson IoT Platform</strong> and
  <strong>TRIRIGA Building Insights</strong> — products that help organizations
  connect millions of devices, derive real-time intelligence, and create smarter,
  more energy-efficient buildings.
  <br><br>
  My engineering interests sit at the intersection of <em>embedded systems</em>,
  <em>cloud architecture</em>, and <em>data-driven decision making</em>.
  I enjoy prototyping with Arduino &amp; Raspberry Pi, designing clean RESTful
  APIs, and mentoring engineers who are just discovering the IoT landscape.

