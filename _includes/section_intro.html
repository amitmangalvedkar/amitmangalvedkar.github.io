{% if site.intro %}
<div id="introBubble" class="rounded_panel txt_lightgrey">
  <div class="top-rounded-panel grey-bg">
    <h1 id="user-intro">👋 About Me</h1>
  </div>
  <div class="content-rounded-panel">
    <div class="row">
      <div class="col-sm-3 text-center" style="padding-bottom:15px;">
        <img src="./img/gravatar.jpeg"
             alt="Amit Mangalvedkar"
             class="img-circle"
             style="width:130px;height:130px;border:4px solid #337ab7;object-fit:cover;">
        <p style="margin-top:10px;font-weight:600;font-size:18px;color:#333;">Amit Mangalvedkar</p>
        <p style="color:#666;font-size:13px;">
          <span style="margin-right:6px;">📍</span>Bangalore, India
        </p>
        <p style="margin-top:6px;">
          <a href="https://github.com/amitmangalvedkar" target="_blank"
             style="margin-right:8px;"
             title="GitHub">
            <img src="https://img.shields.io/badge/GitHub-181717?style=flat-square&logo=github&logoColor=white" alt="GitHub">
          </a>
          <a href="https://www.linkedin.com/in/amit-mangalvedkar/" target="_blank"
             title="LinkedIn">
            <img src="https://img.shields.io/badge/LinkedIn-0077B5?style=flat-square&logo=linkedin&logoColor=white" alt="LinkedIn">
          </a>
        </p>
      </div>
      <div class="col-sm-9" style="font-size:15px;line-height:1.7;color:#333;">
        <div id="introBlurb">
          {{site.intro}}
        </div>
      </div>
    </div>
    <br>
  </div>
</div>
{% endif %}
